<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MorphoIntent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .node { transition: all 0.3s } .node:hover { transform: scale(1.02) }
    @keyframes drift { 0%,100%{transform:translateX(0)} 50%{transform:translateX(3px)} }
    .drifting { animation: drift 3s ease-in-out infinite }
  </style>
</head>
<body class="bg-[#050510] text-white min-h-screen">
  <nav class="border-b border-gray-800/50 px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-2"><span class="text-2xl">🧬</span><h1 class="text-xl font-bold">MorphoIntent</h1></div>
    <span class="text-xs text-gray-600">Living Intent Graph</span>
  </nav>
  <main class="max-w-3xl mx-auto p-6 space-y-6">
    <!-- Post Intent -->
    <section class="bg-gray-900/30 rounded-2xl p-6 border border-gray-800/50 backdrop-blur">
      <h2 class="text-cyan-400 font-semibold mb-4">Post Intent</h2>
      <textarea placeholder="Plain-language commitment (e.g. 'We will maintain 99.9% uptime through Q4')" rows="3" class="w-full bg-black/50 border border-gray-800 rounded-xl px-4 py-3 placeholder-gray-600 outline-none resize-none mb-3"></textarea>
      <input placeholder="Context URL (fetched during re-evaluation)" class="w-full bg-black/50 border border-gray-800 rounded-xl px-4 py-3 mb-3 placeholder-gray-600 outline-none">
      <input placeholder="Parties involved" class="w-full bg-black/50 border border-gray-800 rounded-xl px-4 py-3 mb-3 placeholder-gray-600 outline-none">
      <button class="w-full bg-cyan-600 hover:bg-cyan-500 rounded-xl py-3 font-bold transition">Post Intent</button>
    </section>

    <!-- Intent Node (graph node style) -->
    <section class="space-y-3">
      <h3 class="text-gray-500 text-xs uppercase tracking-wider">Intent Graph</h3>
      <div class="node drifting bg-gradient-to-r from-red-950/50 to-red-900/20 rounded-2xl p-5 border border-red-800/50">
        <div class="flex justify-between items-start mb-3">
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-red-500"></div>
            <span class="text-xs font-mono text-red-400">INVALIDATED</span>
          </div>
          <div class="text-right">
            <p class="text-xs text-gray-500">Confidence</p>
            <p class="text-2xl font-bold text-red-400">0%</p>
          </div>
        </div>
        <p class="text-sm mb-2">"OpenAI will stay a capped-profit company through 2025"</p>
        <div class="grid grid-cols-3 gap-2 mt-3 text-center">
          <div class="bg-black/30 rounded-lg p-2"><p class="text-xs text-gray-500">Drift</p><p class="text-red-400 font-bold">100</p></div>
          <div class="bg-black/30 rounded-lg p-2"><p class="text-xs text-gray-500">Evals</p><p class="font-bold">1</p></div>
          <div class="bg-black/30 rounded-lg p-2"><p class="text-xs text-gray-500">Status</p><p class="text-red-400 text-xs">Dead</p></div>
        </div>
      </div>
    </section>

    <!-- Re-evaluate -->
    <section class="bg-gray-900/30 rounded-2xl p-6 border border-gray-800/50 backdrop-blur">
      <h2 class="text-amber-400 font-semibold mb-3">Re-evaluate Intent</h2>
      <div class="flex gap-3">
        <input placeholder="Intent key" class="flex-1 bg-black/50 border border-gray-800 rounded-xl px-4 py-3 placeholder-gray-600 outline-none">
        <button class="bg-amber-600 hover:bg-amber-500 rounded-xl px-6 font-bold transition">⟳ Re-eval</button>
      </div>
    </section>
  </main>
</body>
</html>
